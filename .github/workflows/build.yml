name: CI Build
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
# Least privilege: without this the workflow token gets broad default permissions.
# Fixes GitHub code-scanning alert #3; rescued from the adiiweb-patch-1 branch before it
# was deleted in the 2026-07-16 single-branch consolidation.
permissions:
  contents: read
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''
          - platform: 'macos-latest'
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - uses: dtolnay/rust-action@stable
      - if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - run: npm run tauri build
      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'ubuntu-22.04'
        with:
          name: nexious-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'windows-latest'
        with:
          name: nexious-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'macos-latest'
        with:
          name: nexious-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
