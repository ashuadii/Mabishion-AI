name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''
          - platform: 'macos-latest'
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-action@stable

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri App
        run: npm run tauri build

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: nexious-linux-release
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: nexious-windows-release
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: nexious-macos-release
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Nexious AI Studio — ${{ github.ref_name }}

            ### What's Included
            - **Linux**: `.deb` (Ubuntu/Debian) + `.AppImage` (Universal)
            - **Windows**: `.msi` installer
            - **macOS**: `.dmg` disk image

            ### Install
            - **Linux**: `sudo dpkg -i *.deb` or `chmod +x *.AppImage && ./*.AppImage`
            - **Windows**: Double-click `.msi`
            - **macOS**: Open `.dmg`, drag to Applications

            ### Features
            - 22 Autonomous AI Workers
            - Local SQLite Database
            - Digital Marketing Command Center
            - Lead CRM with Approval Workflows
            - Website Builder + Image Generator
            - Social Scheduler + SEO Console

            ---
            Built with 🔥 | Powered by AI | Owned by You
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

